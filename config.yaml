# 智能家居价格监控系统配置

# 爬虫配置
crawler:
  delay: 3
  max_retries: 3
  timeout: 30
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# 定时任务配置
scheduler:
  interval_hours: 6
  enabled: true

# 数据库配置
database:
  path: "data/prices.db"

# 目标品类
categories:
  - name: "扫地机器人"
    brands:
      - "科沃斯"
      - "石头"
      - "小米"
      - "追觅"
      - "云鲸"
      - "美的"
      - "海尔"
      - "360"
      - "iRobot"
      - "松下"
  - name: "空调"
    brands:
      - "格力"
      - "美的"
      - "海尔"
      - "小米"
      - "奥克斯"
      - "TCL"
      - "大金"
      - "三菱电机"
  - name: "洗衣机"
    brands:
      - "海尔"
      - "小天鹅"
      - "美的"
      - "西门子"
      - "松下"
      - "LG"
      - "三星"
      - "小米"
  - name: "烘干机"
    brands:
      - "海尔"
      - "小天鹅"
      - "美的"
      - "西门子"
      - "松下"
      - "LG"
      - "博世"
  - name: "智能门锁"
    brands:
      - "小米"
      - "德施曼"
      - "凯迪仕"
      - "鹿客"
      - "飞利浦"
      - "三星"
  - name: "智能音箱"
    brands:
      - "小米"
      - "小度"
      - "天猫精灵"
      - "华为"
      - "苹果"

# 爬取平台
platforms:
  - jd
  - tmall
  - suning
  - brands
